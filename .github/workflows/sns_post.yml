name: SNS Auto Post

on:
  schedule:
    - cron: "23 10 * * 0,3"  # 週2回（日曜=0・水曜=3）19:23 JST（半端な分で混雑回避＋GitHub遅延ののりしろ。実配信は19:23〜21時台を想定）
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          pip install requests pillow

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # スクリプトが画像とスナップショットのcommit/pushまで内部で行う
      - name: Post to Threads and Instagram
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN_FUKUOKA_TENSHI }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKENfukuokatenshi20260711 }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/sns_post.py
