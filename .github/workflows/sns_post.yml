name: Threads Auto Post

on:
  schedule:
    - cron: "30 11 * * *"  # 20:30 JST
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Post to Threads
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN_FUKUOKA_TENSHI }}
        run: python scripts/sns_post.py

      - name: Commit updated snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sns_snapshot.json
          git diff --cached --quiet || git commit -m "chore: update sns snapshot [skip ci]"
          git push
